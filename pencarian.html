<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencarian Global</title>
    <!-- Menghubungkan ke file CSS eksternal yang baru dan estetik -->
    <link rel="stylesheet" href="pencarian.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <div class="container">
        
        <h1 class="title">Pencarian</h1>
        
        <div class="search-container">
            <input type="text" id="globalSearch" placeholder="Cari teks Arab atau Indonesia..." class="search-input">
            <i class="fas fa-search search-icon"></i>
        </div>

        <div id="countResult" class="result-count"></div>
        <div class="menu-list" id="searchResults"></div>
    </div>

<script>
    const searchInput = document.getElementById('globalSearch');
    const resultsContainer = document.getElementById('searchResults');
    const countContainer = document.getElementById('countResult');
    let allData = [];

    // Fungsi hapus harakat dan normalisasi Alif
    function removeDiacritics(text) {
        let bersih = text.replace(/[\u064B-\u0652]/g, "");
        bersih = bersih.replace(/[\u0622\u0623\u0625]/g, "ا");
        return bersih;
    }

    // Memuat kedua file JSON secara bersamaan
    Promise.all([
        fetch('rumusan_data.json').then(res => res.json()).catch(err => { console.error("Gagal memuat rumusan_data", err); return []; }),
        fetch('data_bahtsu.json').then(res => res.json()).catch(err => { console.error("Gagal memuat data_bahtsu", err); return []; })
    ])
    .then(([dataRumusan, dataBahtsu]) => {
        // Gabungkan data sambil memberi tanda asal sumber filenya
        const rumusanBerlabel = dataRumusan.map(item => ({ ...item, sumber: 'rumusan' }));
        const bahtsuBerlabel = dataBahtsu.map(item => ({ ...item, sumber: 'bahtsu' }));
        
        allData = [...rumusanBerlabel, ...bahtsuBerlabel];
        console.log("Semua data berhasil digabungkan. Jumlah data:", allData.length);
    })
    .catch(err => console.error("Gagal memproses data", err));

    searchInput.addEventListener('input', (e) => {
        const keyword = e.target.value.trim();
        const cleanKey = removeDiacritics(keyword.toLowerCase());

        if (cleanKey.length < 2) {
            resultsContainer.innerHTML = '';
            countContainer.textContent = '';
            return;
        }

        const filtered = allData.filter(item => {
            const content = `${item.judul_pendek} ${item.deskripsi} ${item.pertanyaan} ${item.jawaban} ${item.referensi.join(' ')}`;
            return removeDiacritics(content.toLowerCase()).includes(cleanKey);
        });

        // Mengurutkan hasil pencarian berdasarkan abjad judul_pendek
        filtered.sort((a, b) => a.judul_pendek.localeCompare(b.judul_pendek));

        displayResults(filtered, keyword);
    });

    function displayResults(results, key) {
        resultsContainer.innerHTML = '';
        countContainer.textContent = `Ditemukan ${results.length} hasil untuk "${key}"`;

        results.forEach(item => {
            const div = document.createElement('div');
            div.className = 'menu-item';
            
            const fullText = `${item.deskripsi} ${item.pertanyaan} ${item.jawaban} ${item.referensi.join(' ')}`;
            const cleanFullText = removeDiacritics(fullText.toLowerCase());
            const cleanKey = removeDiacritics(key.toLowerCase());
            const index = cleanFullText.indexOf(cleanKey);
            
            let snippet = "";
            if (index !== -1) {
                const start = Math.max(0, index - 30);
                const end = Math.min(fullText.length, index + 50);
                snippet = "..." + fullText.substring(start, end) + "...";
            }

            // Memilih ikon berdasarkan sumber datanya agar lebih informatif
            const iconClass = item.sumber === 'bahtsu' ? 'fa-book-open-reader' : 'fa-file-alt';
            const labelSumber = item.sumber === 'bahtsu' ? '<span style="font-size:0.7rem; color:#3f9e30; border:1px solid #3f9e30; padding:1px 4px; border-radius:4px; margin-left:5px; vertical-align:middle;">Bahtsu</span>' : '';

            div.innerHTML = `
                <i class="fas ${iconClass}"></i>
                <div style="text-align: left; margin-left: 14px; width: 85%;">
                    <strong style="display:block; font-size:0.95rem;">${item.judul_pendek} ${labelSumber}</strong>
                    <span class="snippet">${snippet}</span>
                </div>
            `;
            
            // Pengalihan halaman yang disesuaikan dengan sumber data
            div.onclick = () => {
                if (item.sumber === 'bahtsu') {
                    window.location.href = `detail_bahtsu.html?id=${encodeURIComponent(item.id)}&highlight=${encodeURIComponent(key)}`;
                } else {
                    window.location.href = `detail_Rumusan.html?id=${encodeURIComponent(item.id)}&highlight=${encodeURIComponent(key)}`;
                }
            };
            resultsContainer.appendChild(div);
        });
    }
</script>
</body>
</html>
