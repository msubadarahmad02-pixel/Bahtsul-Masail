<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Detail Rumusan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- PANGGIL FILE CSS YANG BARU DI SINI -->
    <link rel="stylesheet" href="detail_rumusan.css">
</head>

<body>

    <div class="container">
        <h1 class="title" id="detailTitle">Memuat...</h1>
        <button id="copyButton" class="copy-button"><i class="fas fa-copy"></i> Salin Teks</button>
        <div id="rumusanContent"></div>
    </div>

    <div id="copyNotification" class="copy-notification">Berhasil disalin!</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const rumusanId = urlParams.get('id');
    const highlightKey = urlParams.get('highlight');

    // 1. Fungsi hapus harakat
    function removeDiacritics(text) {
        return text.replace(/[\u064B-\u0652]/g, "");
    }
    
    // 2. Fungsi highlight cerdas otomatis (Mendukung teks Arab berharakat)
    function applyGlobalHighlight() {
        if (!highlightKey) return;
        const container = document.getElementById('rumusanContent');
        
        // Bersihkan keyword dari harakat agar kita punya teks dasarnya
        const cleanKey = removeDiacritics(highlightKey).toLowerCase();
        
        // Buat pola Regex yang mengabaikan harakat DAN menyamakan semua jenis Alif
        const arabicDiacritics = "[\\u064B-\\u0652]*";
        const regexPattern = cleanKey.split('').map(char => {
            let escapedChar = char.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            
            // JIKA KARAKTER ADALAH ALIF (ا atau variannya), cocokkan semua jenis Alif
            if (/[\u0622\u0623\u0625\u0627]/.test(char)) {
                escapedChar = "[\\u0622\\u0623\\u0625\\u0627]";
            }
            
            // Jika karakter adalah huruf Arab secara umum, selipkan pola pengabaian harakat
            return /[\u0600-\u06FF]/.test(char) ? escapedChar + arabicDiacritics : escapedChar;
        }).join('');

        const regex = new RegExp(`(${regexPattern})`, 'gi');

        const walk = (node) => {
            let child = node.firstChild;
            while (child) {
                const next = child.nextSibling;
                if (child.nodeType === 3) { // Node Teks
                    const originalText = child.nodeValue;
                    
                    // Cek apakah teks mengandung pola yang kita cari
                    if (regex.test(originalText)) {
                        const span = document.createElement('span');
                        // Ganti teks asli dengan versi yang dibungkus span highlight tanpa merusak harakat asli
                        span.innerHTML = originalText.replace(regex, '<span class="highlight-blue">$1</span>');
                        child.parentNode.replaceChild(span, child);
                    }
                } else if (child.nodeType === 1 && child.tagName !== 'SPAN') {
                    walk(child);
                }
                child = next;
            }
        };
        walk(container);
    }

    if (rumusanId) {
        fetch('rumusan_data.json')
            .then(res => res.json())
            .then(data => {
                const item = data.find(i => i.id === rumusanId);
                if (item) {
                    document.getElementById('detailTitle').innerHTML = item.judul_pendek;

                    const refHtml = item.referensi.map(ref => {
                        const isAr = /[\u0600-\u06FF]/.test(ref);
                        return `<p class="content-text" ${isAr ? 'style="direction: rtl;"' : ''}>${ref}</p>`;
                    }).join('');

                    const deskripsiHtml = item.deskripsi.split('\n').map(line => {
                        const isAr = /[\u0600-\u06FF]/.test(line);
                        return `<p class="content-text" ${isAr ? 'style="direction: rtl;"' : ''}>${line}</p>`;
                    }).join('');

                    const pertanyaanHtml = item.pertanyaan.split('\n').map(line => {
                        const isAr = /[\u0600-\u06FF]/.test(line);
                        return `<p class="content-text" ${isAr ? 'style="direction: rtl;"' : ''}>${line}</p>`;
                    }).join('');

                    const jawabanHtml = item.jawaban.split('\n').map(line => {
                        const isAr = /[\u0600-\u06FF]/.test(line);
                        return `<p class="content-text" ${isAr ? 'style="direction: rtl;"' : ''}>${line}</p>`;
                    }).join('');

                    // Masukkan variabel ke dalam HTML
                    document.getElementById('rumusanContent').innerHTML = `
                        <div class="section-group">
                            <div class="section-title">Deskripsi:</div>
                            ${deskripsiHtml}
                        </div>
                        <div class="section-group">
                            <div class="section-title">Pertanyaan:</div>
                            ${pertanyaanHtml}
                        </div>
                        <div class="section-group">
                            <div class="section-title">Jawaban:</div>
                            ${jawabanHtml}
                        </div>
                        <div class="section-group">
                            <div class="section-title">Referensi:</div>
                            ${refHtml}
                        </div>
                    `;

                    // Panggil fungsi sorotan setelah HTML terpasang di layar
                    setTimeout(applyGlobalHighlight, 300);

                    // Fungsi Salin (Copy)
                    document.getElementById('copyButton').onclick = async () => {
                        const txt = `JUDUL: ${item.judul_pendek}\n\nDESKRIPSI:\n${item.deskripsi}\n\nPERTANYAAN:\n${item.pertanyaan}\n\nJAWABAN:\n${item.jawaban}\n\nREFERENSI:\n${item.referensi.join('\n')}`;
                        await navigator.clipboard.writeText(txt);
                        const n = document.getElementById('copyNotification');
                        n.classList.add('show');
                        setTimeout(() => n.classList.remove('show'), 2000);
                    };
                }
            });
    }
</script>
