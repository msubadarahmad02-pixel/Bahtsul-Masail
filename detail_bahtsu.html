<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Detail Bahtsu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="Detail_bahtsu.css">
</head>
<body>

    <div class="container">
        <h1 class="title" id="detailTitle">Memuat...</h1>
        <button id="copyButton" class="copy-button"><i class="fas fa-copy"></i> Salin Teks</button>
        <div id="rumusanContent"></div>
    </div>

    <div id="copyNotification" class="copy-notification">Berhasil disalin!</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const rumusanId = urlParams.get('id');
    // 1. Ambil kata kunci highlight dari URL jika ada
    const highlightKey = urlParams.get('highlight'); 

    // 2. Fungsi untuk menyorot kata kunci tanpa merusak struktur HTML
    function highlightText(text, keyword) {
        if (!keyword) return text;
        
        // Mengamankan karakter khusus regex agar tidak eror
        const escapedKeyword = keyword.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
        const regex = new RegExp(`(${escapedKeyword})`, 'gi');
        
        // Bungkus kata yang cocok dengan tag <mark> bawaan HTML
        return text.replace(regex, '<mark class="highlight-search">$1</mark>');
    }

    if (rumusanId) {
        // Mengambil data khusus dari data_bahtsu.json
        fetch('data_bahtsu.json')
            .then(res => res.json())
            .then(data => {
                const item = data.find(i => i.id === rumusanId);
                if (item) {
                    document.getElementById('detailTitle').innerHTML = item.judul_pendek;

                    // Terapkan fungsi highlight pada setiap bagian teks sebelum dimasukkan ke halaman
                    const refHtml = item.referensi.map(ref => {
                        const highlightedRef = highlightText(ref, highlightKey);
                        const isAr = /[\u0600-\u06FF]/.test(ref);
                        return `<p class="content-text" ${isAr ? 'style="direction: rtl;"' : ''}>${highlightedRef}</p>`;
                    }).join('');

                    const deskripsiHtml = item.deskripsi.split('\n').map(line => {
                        const highlightedLine = highlightText(line, highlightKey);
                        const isAr = /[\u0600-\u06FF]/.test(line);
                        return `<p class="content-text" ${isAr ? 'style="direction: rtl;"' : ''}>${highlightedLine}</p>`;
                    }).join('');

                    const pertanyaanHtml = item.pertanyaan.split('\n').map(line => {
                        const highlightedLine = highlightText(line, highlightKey);
                        const isAr = /[\u0600-\u06FF]/.test(line);
                        return `<p class="content-text" ${isAr ? 'style="direction: rtl;"' : ''}>${highlightedLine}</p>`;
                    }).join('');

                    const jawabanHtml = item.jawaban.split('\n').map(line => {
                        const highlightedLine = highlightText(line, highlightKey);
                        const isAr = /[\u0600-\u06FF]/.test(line);
                        return `<p class="content-text" ${isAr ? 'style="direction: rtl;"' : ''}>${highlightedLine}</p>`;
                    }).join('');

                    document.getElementById('rumusanContent').innerHTML = `
                        <div class="section-group">
                            <div class="section-title">Deskripsi:</div>
                            ${deskripsiHtml}
                        </div>
                        <div class="section-group">
                            <div class="section-title">Pertanyaan:</div>
                            ${pertanyaanHtml}
                        </div>
                        <div class="section-group">
                            <div class="section-title">Jawaban:</div>
                            ${jawabanHtml}
                        </div>
                        <div class="section-group">
                            <div class="section-title">Referensi:</div>
                            ${refHtml}
                        </div>
                    `;

                    // Fungsi Salin (Copy)
                    document.getElementById('copyButton').onclick = async () => {
                        const txt = `JUDUL: ${item.judul_pendek}\n\nDESKRIPSI:\n${item.deskripsi}\n\nPERTANYAAN:\n${item.pertanyaan}\n\nJAWABAN:\n${item.jawaban}\n\nREFERENSI:\n${item.referensi.join('\n')}`;
                        await navigator.clipboard.writeText(txt);
                        const n = document.getElementById('copyNotification');
                        n.classList.add('show');
                        setTimeout(() => n.classList.remove('show'), 2000);
                    };
                }
            });
    }
</script>

</body>
</html>
