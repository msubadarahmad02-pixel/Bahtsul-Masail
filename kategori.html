<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Rumusan</title>
    <link rel="stylesheet" href="kategori.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <div class="container">
        
        <h1 class="title">Daftar Rumusan</h1>
        
        <input type="text" id="filterInput" placeholder="Cari Kategori..." class="filter-input">
        <div class="rumusan-list" id="kategoriList"></div>

    </div>

<script>
    const kategoriListElement = document.getElementById('kategoriList');

    // 1. Ambil data dari file JSON
    fetch('rumusan_data.json')
        .then(response => {
            if (!response.ok) {
                throw new Error('Gagal memuat rumusan_data.json');
            }
            return response.json();
        })
        .then(data => {
            // 2. Ekstrak daftar kategori unik dan urutkan sesuai abjad
            const kategoriUnik = [...new Set(data.map(item => item.kategori))].sort((a, b) => a.localeCompare(b));

            // 3. Buat elemen HTML untuk setiap kategori
            kategoriUnik.forEach((kategori, index) => {
                const itemElement = document.createElement('div');
                itemElement.classList.add('rumusan-item');
                
                // Tambahkan ID ke elemen, agar mudah dikenali
                itemElement.id = `kategori-${kategori.replace(/\s/g, '_')}`; 
                
                // DI SINI PERUBAHANNYA: Love dihapus, nomor urut otomatis ditambahkan
                itemElement.innerHTML = `
                    <span class="nomor-urut">${index + 1}.</span>
                    <span class="nama-kategori-teks">${kategori}</span>
                `;
                
                // Tambahkan fungsi klik untuk mengarahkan ke daftar rumusan kategori
                itemElement.addEventListener('click', () => {
                    window.location.href = `Daftar_Rumusan_by_Kategori.html?kategori=${encodeURIComponent(kategori)}`;
                });

                kategoriListElement.appendChild(itemElement);
            });
        })
        .catch(error => {
            console.error('Error memuat atau memproses data:', error);
            kategoriListElement.innerHTML = '<p>Error: Gagal memuat daftar kategori.</p>';
        });
        
    // === KODE FITUR PENCARIAN (SUDAH DIPERBAIKI SUPAYA TIDAK ERROR KARENA ADA NOMOR) ===
    const filterInput = document.getElementById('filterInput');

    filterInput.addEventListener('input', function() {
        const kataKunci = this.value.toLowerCase(); 
        const daftarKategori = document.querySelectorAll('.rumusan-item'); 

        daftarKategori.forEach(item => {
            // Kita ambil teks kategorinya saja tanpa mengambil nomor urutnya
            const targetTeks = item.querySelector('.nama-kategori-teks');
            if (targetTeks) {
                const namaKategori = targetTeks.textContent.toLowerCase(); 
                
                if (namaKategori.includes(kataKunci)) {
                    item.style.display = 'flex'; 
                } else {
                    item.style.display = 'none'; 
                }
            }
        });
    });
</script>

</body>
</html>
