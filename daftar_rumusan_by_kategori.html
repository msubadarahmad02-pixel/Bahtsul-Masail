<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Daftar Rumusan</title>
    <link rel="stylesheet" href="daftar_rumusan_by_kategori.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

   <div class="container">
    
    <h1 class="title" id="kategoriTitle"></h1>

    <input type="text" id="filterRumusanInput" placeholder="Cari Rumusan..." class="filter-input">

    <div class="menu-list" id="rumusanList"></div>
</div>


<script>
    const urlParams = new URLSearchParams(window.location.search);
    const kategori = urlParams.get('kategori'); // Ambil kategori dari URL

    const titleElement = document.getElementById('kategoriTitle');
    const rumusanListElement = document.getElementById('rumusanList');
    
    if (kategori) {
        // Set judul halaman
        titleElement.textContent = kategori;
        document.getElementById('pageTitle').textContent = kategori + ' ';

        // 1. Ambil data dari file JSON
        fetch('rumusan_data.json')
            .then(response => response.json())
            .then(data => {
               // 2. Filter rumusan berdasarkan kategori dan urutkan sesuai abjad judul_pendek
                const filteredRumusan = data
                    .filter(item => item.kategori === kategori)
                    .sort((a, b) => a.judul_pendek.localeCompare(b.judul_pendek));

                if (filteredRumusan.length === 0) {
                    rumusanListElement.innerHTML = '<p style="text-align: center; color: #795548;">Belum ada rumusan dalam kategori ini.</p>';
                    return;
                }

                // 3. Buat elemen HTML untuk setiap rumusan (Ikon love dihapus, ganti nomor urut)
                filteredRumusan.forEach((item, index) => {
                    const itemElement = document.createElement('div');
                    itemElement.classList.add('menu-item'); 
                    
                    // Kita bungkus judul dengan class "judul-rumusan-teks" agar bisa difilter dengan aman
                    itemElement.innerHTML = `
                        <span class="nomor-urut">${index + 1}.</span>
                        <span class="judul-rumusan-teks">${item.judul_pendek}</span>
                    `;
                    
                    // Fungsi klik untuk mengarahkan ke halaman detail
                    itemElement.addEventListener('click', () => {
                        window.location.href = `detail_rumusan.html?id=${encodeURIComponent(item.id)}`;
                    });

                    rumusanListElement.appendChild(itemElement);
                });
            })
            .catch(error => {
                console.error('Error memuat data:', error);
                rumusanListElement.innerHTML = '<p>Error: Gagal memuat daftar rumusan.</p>';
            });
    } else {
        titleElement.textContent = 'Kategori Tidak Ditemukan';
        rumusanListElement.innerHTML = '<p style="text-align: center; color: #795548;">Silakan kembali ke Daftar Rumusan Utama.</p>';
    }
    
    // === KODE FITUR PENCARIAN (SUDAH DIPERBAIKI AGAR TIDAK BENTROK DENGAN NOMOR) ===
    const filterRumusanInput = document.getElementById('filterRumusanInput');

    filterRumusanInput.addEventListener('input', function() {
        const kataKunci = this.value.toLowerCase(); 
        const daftarRumusan = document.querySelectorAll('.menu-item'); 

        daftarRumusan.forEach(item => {
            // Hanya membaca teks judul rumusan saja, mengabaikan angka nomor urut
            const targetTeks = item.querySelector('.judul-rumusan-teks');
            if (targetTeks) {
                const judulRumusan = targetTeks.textContent.toLowerCase();
                
                if (judulRumusan.includes(kataKunci)) {
                    item.style.display = 'flex'; 
                } else {
                    item.style.display = 'none';
                }
            }
        });
    });
</script>

</body>
</html>
